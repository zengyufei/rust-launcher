name: Release

on:
  push:
    tags:
      - "**"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  release:
    name: Build and publish Windows binaries
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install stable Rust
        shell: pwsh
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable

      - name: Test
        run: cargo test --workspace --locked

      - name: Build
        run: cargo build --workspace --release --locked

      - name: Package
        id: package
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $safeTag = $tag -replace '[^A-Za-z0-9._-]', '-'
          $repo = "${{ github.event.repository.name }}"
          $dist = "dist"
          $archive = "$repo-$safeTag-windows-x64.zip"

          New-Item -ItemType Directory -Force $dist | Out-Null
          Copy-Item "target/release/launcher.exe" "$dist/launcher.exe"
          Copy-Item "target/release/launcher-gui.exe" "$dist/launcher-gui.exe"
          Copy-Item "README.md" "$dist/README.md"
          Compress-Archive -Path "$dist/*" -DestinationPath $archive -Force

          "archive=$archive" >> $env:GITHUB_OUTPUT

      - name: Publish GitHub release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = "${{ github.ref_name }}"
          $archive = "${{ steps.package.outputs.archive }}"

          gh release view $tag *> $null
          if ($LASTEXITCODE -eq 0) {
            gh release upload $tag $archive --clobber
          } else {
            gh release create $tag $archive --title $tag --notes "Automated release for $tag."
          }

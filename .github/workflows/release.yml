name: Release

on:
  push:
    tags:
      - "**"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  release:
    name: Build and publish Windows binaries
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install stable Rust
        shell: pwsh
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable

      - name: Restore Cargo dependency cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-deps-${{ hashFiles('**/Cargo.lock', '**/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-deps-

      - name: Build
        run: cargo build --workspace --release --locked

      - name: Prepare release binaries
        id: binaries
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $safeTag = $tag -replace '[^A-Za-z0-9._-]', '-'
          $repo = "${{ github.event.repository.name }}"
          $dist = "dist"
          $cli = "$repo-cli-$safeTag-windows-x64.exe"
          $gui = "$repo-gui-$safeTag-windows-x64.exe"

          New-Item -ItemType Directory -Force $dist | Out-Null
          Copy-Item "target/release/launcher.exe" "$dist/$cli"
          Copy-Item "target/release/launcher-gui.exe" "$dist/$gui"

          "cli=$dist/$cli" >> $env:GITHUB_OUTPUT
          "gui=$dist/$gui" >> $env:GITHUB_OUTPUT

      - name: Publish GitHub release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = "${{ github.ref_name }}"
          $cli = "${{ steps.binaries.outputs.cli }}"
          $gui = "${{ steps.binaries.outputs.gui }}"

          gh release view $tag *> $null
          if ($LASTEXITCODE -eq 0) {
            gh release view $tag --json assets --jq '.assets[].name' |
              Where-Object { $_ -like "*.zip" } |
              ForEach-Object { gh release delete-asset $tag $_ --yes }
            gh release upload $tag $cli $gui --clobber
          } else {
            gh release create $tag $cli $gui --title $tag --notes "Automated release for $tag."
          }
